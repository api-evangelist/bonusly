sources:
  - url: https://docs.bonus.ly/
    type: Documentation
    note: API reference home; version v1.0, MCP server announced 2026-05-22. All REST, no WebSocket.
  - url: https://docs.bonus.ly/llms.txt
    type: Documentation
    note: Machine index of every documented page and endpoint; used to enumerate Bonuses, Users, Redemptions, Awards, Company, Achievements, Analytics, Uploads, SCIM.
  - url: https://docs.bonus.ly/docs/authentication.md
    type: Documentation
    note: Bearer PAT auth, scopes (read/write/administer), 429 with Retry-After, base https://bonus.ly/api/public.
  - url: https://help.bonus.ly/en/articles/1258685-connecting-to-the-bonusly-api
    type: Documentation
    note: Base https://bonus.ly/api/v1, Authorization Bearer header, admin vs user tokens.
  - url: https://bonusly.com/pricing
    type: Pricing
    note: Free / Team / Organization plans; paid plans carry API access.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Bonusly's own API. The public API is
    request/response REST (plus SCIM 2.0 provisioning and an MCP server that
    fronts the same REST surface). The Analytics API is asynchronous only via a
    queue/poll/list pattern over REST, not a server-push channel. No AsyncAPI
    document was created because there is no streaming or bidirectional
    transport on Bonusly's own API to model.
