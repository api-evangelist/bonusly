meters:
- name: seats
  description: Active users on the paid plan, billed per employee per month (PEPM).
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: reward_budget
  description: Dollars funding the points employees redeem for gift cards, donations, and custom rewards, billed separately from the subscription.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - reward_type
  - country
- name: bizy_ai
  description: Optional Bizy AI add-on, per user per month when purchased separately.
  unit: seats
  aggregation: sum
  dimensions:
  - account
- name: mcp_tool_calls
  description: AI-agent tool calls through the MCP server against an included monthly allotment on the top plan.
  unit: tool_calls
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Separate the platform subscription (PEPM seats) from the reward budget; track both against headcount and redemption activity.
- name: Allocation
  description: Attribute seats and reward redemptions to departments or teams using the department field on users and the analytics snapshots.
- name: Optimization
  description: Right-size the base allowance and reward budget to actual redemption patterns; deactivate archived users to stop paying for inactive seats.
- name: Accountability
  description: Assign an owner for the subscription and a separate owner for the reward budget; review monthly PEPM and redemption spend together.
