description: >-
  FinOps view of Bonusly spend. A Bonusly deployment has two distinct cost
  components. The first is the platform subscription, billed per employee per
  month (PEPM) across the Team and Organization plans, plus the optional Bizy AI
  add-on. The second - often the larger line item - is the reward budget: the
  actual dollars funding the points employees give and redeem for gift cards,
  donations, and custom rewards. The API is included with the paid platform
  subscription and does not carry a separate metered fee, except that AI-agent
  access via the MCP server draws on an included monthly allotment of tool calls
  on the top plan.
notes: >-
  PEPM rates are list prices and the Organization tier is custom-quoted; verify
  on the Bonusly pricing page. The reward budget is funded and billed
  separately from the subscription and is typically the dominant cost driver.
  API usage itself is not separately metered on the standard plans.
