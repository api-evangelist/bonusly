aid: bonusly
url: https://raw.githubusercontent.com/api-evangelist/bonusly/refs/heads/main/apis.yml
name: Bonusly
kind: company
description: Bonusly is an employee recognition and rewards platform that lets
  coworkers give each other small, frequent, public bonuses tied to company
  values, which recipients redeem for gift cards, custom rewards, donations, and
  more. The Bonusly REST API (base https://bonus.ly/api/v1) exposes the same
  surface the product is built on - bonuses, users, the reward catalog,
  redemptions, awards, company settings, and analytics - authenticated with a
  Bearer personal access token. API access is available on paid plans; tokens
  are minted by admins with fine-grained read / write / administer scopes.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Employee Recognition
- Rewards
- Employee Engagement
- HR
- Company Culture
- Bonuses
